<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://bananayx.github.io/files/img/Banana头像.png" type="image/x-icon">
    <title>Banana Y.X. 静态资源库</title>
    <style>
        :root {
            --primary-color: #4a6bff;
            --secondary-color: #f8f9fa;
            --text-color: #333;
            --hover-color: #3a56d4;
        }
        
        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--secondary-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
        }
        
        h1 {
            color: var(--primary-color);
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }
        
        .description {
            font-size: 1.2rem;
            margin-bottom: 3rem;
            opacity: 0.8;
        }
        
        .link {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .link:hover {
            background-color: var(--hover-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Banana Y.X. 静态资源库</h1>
        <p class="description">我的静态资源库</p>
        <a href="https://bananayx.github.io" class="link">访问Banana Y.X.的小站</a>
    </div>
    <footer style="
        margin-top: 3rem;
        padding: 1rem;
        font-size: 0.9rem;
        color: #666;
        text-align: center;
    ">
        该页面由AI生成
    </footer>
</body>
</html>
